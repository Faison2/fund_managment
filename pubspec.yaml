name: tsl
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.1+9

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  shared_preferences: ^2.2.2
  country_code_picker: ^3.0.0
  intl_phone_field: ^3.2.0
  intl: ^0.20.2
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  file_picker: ^10.3.10
  fl_chart: ^1.1.1
  pdf: ^3.10.7
  printing: ^5.11.0
  provider: ^6.1.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.4
  mocktail: ^0.3.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

# ✅ MUST be outside flutter:
flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/launcher/ic_launcher.png"